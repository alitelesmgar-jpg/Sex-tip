<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Collection</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400&family=Inter:wght@300&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0b0505;
color:#fff;
font-family:Inter;
}

nav{
position:sticky;
top:0;
padding:20px 8%;
backdrop-filter:blur(25px);
display:flex;
justify-content:space-between;
background:rgba(0,0,0,0.35);
}

.heroText{
padding:120px 8%;
font-family:"Playfair Display";
font-size:42px;
letter-spacing:6px;
opacity:.9;
}

/* APPLE STYLE GRID */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:60px;
padding:0 8% 160px;
}

.card{
opacity:0;
transform:translateY(50px);
transition:1.2s cubic-bezier(.2,.8,.2,1);
}

.card.show{
opacity:1;
transform:translateY(0);
}

img{
width:100%;
border-radius:18px;
transition:1s ease;
}

.card:hover img{
transform:scale(1.08);
filter:brightness(1.05);
}

h3{
font-family:"Playfair Display";
letter-spacing:3px;
margin-top:18px;
}

p{
opacity:.6;
}

a{
color:#c8a45d;
text-decoration:none;
}

</style>
</head>

<body>

<nav>
<a href="atelier.html">ATELIER</a>
<a href="editorial.html">EDITORIAL</a>
</nav>

<div class="heroText">
A curated universe of rare culinary objects.
</div>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1546549032-9571cd6b27df">
<h3>Truffle Essence</h3>
<p>Black diamond extraction</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1604908177522-0407e0c7b6b2">
<h3>Chocolate Noir</h3>
<p>Single origin cacao</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd">
<h3>Golden Honey</h3>
<p>Wild alpine reserve</p>
</div>

</div>

<script>

const cards=document.querySelectorAll(".card");

const obs=new IntersectionObserver(e=>{
e.forEach(i=>{
if(i.isIntersecting)i.target.classList.add("show");
});
},{threshold:0.2});

cards.forEach(c=>obs.observe(c));

</script>

</body>
</html>
