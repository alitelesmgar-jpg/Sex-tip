<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ورود مدیریت — NOIR & OR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ============ RESET & ROOT ============ */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --burgundy: #4A0E17;
      --burgundy-dark: #2C080E;
      --espresso: #1E1410;
      --espresso-light: #2A1F1A;
      --white: #FFFFFF;
      --gold: #D4AF37;
      --gold-dark: #B8941F;
      --gold-light: rgba(212, 175, 55, 0.15);
      --gold-glow: rgba(212, 175, 55, 0.5);
      --serif: 'Cormorant Garamond', 'Playfair Display', Georgia, 'Times New Roman', serif;
      --sans: 'Inter', 'Helvetica Neue', 'Segoe UI', Arial, sans-serif;
      --transition-slow: 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
      --transition-medium: 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
      --transition-fast: 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--sans);
      font-weight: 300;
      background: var(--espresso);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ============ GOLD PARTICLES ============ */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0;
      animation: floatUp 8s infinite ease-in;
    }

    .particle:nth-child(1) { width: 2px; height: 2px; left: 5%; animation-delay: 0s; animation-duration: 7s; }
    .particle:nth-child(2) { width: 3px; height: 3px; left: 15%; animation-delay: 0.5s; animation-duration: 9s; }
    .particle:nth-child(3) { width: 1px; height: 1px; left: 25%; animation-delay: 1s; animation-duration: 5s; }
    .particle:nth-child(4) { width: 4px; height: 4px; left: 35%; animation-delay: 1.5s; animation-duration: 10s; }
    .particle:nth-child(5) { width: 2px; height: 2px; left: 45%; animation-delay: 2s; animation-duration: 6s; }
    .particle:nth-child(6) { width: 3px; height: 3px; left: 55%; animation-delay: 0.8s; animation-duration: 8s; }
    .particle:nth-child(7) { width: 1px; height: 1px; left: 65%; animation-delay: 2.5s; animation-duration: 7s; }
    .particle:nth-child(8) { width: 2px; height: 2px; left: 75%; animation-delay: 1.2s; animation-duration: 9s; }
    .particle:nth-child(9) { width: 3px; height: 3px; left: 85%; animation-delay: 3s; animation-duration: 6s; }
    .particle:nth-child(10) { width: 1px; height: 1px; left: 92%; animation-delay: 0.3s; animation-duration: 8s; }
    .particle:nth-child(11) { width: 2px; height: 2px; left: 10%; animation-delay: 1.8s; animation-duration: 11s; }
    .particle:nth-child(12) { width: 3px; height: 3px; left: 50%; animation-delay: 2.2s; animation-duration: 7s; }
    .particle:nth-child(13) { width: 1px; height: 1px; left: 70%; animation-delay: 0.7s; animation-duration: 9s; }
    .particle:nth-child(14) { width: 2px; height: 2px; left: 88%; animation-delay: 1.4s; animation-duration: 10s; }
    .particle:nth-child(15) { width: 4px; height: 4px; left: 40%; animation-delay: 3.2s; animation-duration: 6s; }

    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      20% { opacity: 0.6; }
      80% { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }

    /* ============ LOGIN CONTAINER ============ */
    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 450px;
      padding: 0 2rem;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 1.5rem;
      padding: 3.5rem 2.5rem;
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      box-shadow: 0 0 80px rgba(212, 175, 55, 0.05), 0 20px 60px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    .login-emblem {
      font-size: 2.5rem;
      color: var(--gold);
      animation: pulse 3s ease-in-out infinite;
      display: inline-block;
      margin-bottom: 1rem;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    .login-brand {
      font-family: var(--serif);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.1em;
      margin-bottom: 0.3rem;
    }

    .login-title {
      font-family: var(--serif);
      font-size: 1.3rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
    }

    .golden-line {
      width: 50px;
      height: 1px;
      background: var(--gold);
      margin: 0 auto 2rem;
    }

    /* Error Message */
    .error-message {
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.3);
      border-radius: 0.8rem;
      padding: 0.8rem 1rem;
      margin-bottom: 1.5rem;
      display: none;
      animation: fadeIn 0.3s ease-out;
    }

    .error-message.show {
      display: block;
    }

    .error-message p {
      font-family: var(--sans);
      font-weight: 300;
      font-size: 0.8rem;
      color: #FCA5A5;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Form */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .input-group {
      width: 100%;
      position: relative;
    }

    .input-icon {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      left: 0;
      color: rgba(212, 175, 55, 0.3);
      font-size: 1rem;
      pointer-events: none;
      transition: color var(--transition-fast);
    }

    .login-input {
      width: 100%;
      font-family: var(--sans);
      font-weight: 300;
      font-size: 0.9rem;
      color: white;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(212, 175, 55, 0.2);
      padding: 0.9rem 0;
      padding-left: 1.5rem;
      outline: none;
      letter-spacing: 0.05em;
      transition: all var(--transition-fast);
    }

    .login-input::placeholder {
      color: rgba(255, 255, 255, 0.15);
    }

    .login-input:focus {
      border-bottom-color: var(--gold);
    }

    .login-input:focus ~ .input-icon {
      color: var(--gold);
    }

    .login-input[type="password"] {
      letter-spacing: 0.2em;
      font-size: 1rem;
    }

    .btn-login {
      width: 100%;
      font-family: var(--sans);
      font-weight: 400;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--espresso);
      background: var(--gold);
      border: none;
      padding: 1.1rem;
      border-radius: 50px;
      cursor: pointer;
      transition: all var(--transition-medium);
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
      margin-top: 0.5rem;
    }

    .btn-login:hover {
      box-shadow: 0 0 40px rgba(212, 175, 55, 0.4), 0 0 80px rgba(212, 175, 55, 0.15);
      transform: translateY(-2px);
      background: var(--gold-dark);
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      font-family: var(--sans);
      font-weight: 300;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.3);
      text-decoration: none;
      letter-spacing: 0.1em;
      transition: color var(--transition-fast);
    }

    .back-link:hover {
      color: var(--gold);
    }

    /* ============ RESPONSIVE ============ */
    @media (max-width: 500px) {
      .login-card {
        padding: 2.5rem 1.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- ============ GOLD PARTICLES ============ -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- ============ LOGIN FORM ============ -->
  <div class="login-container">
    <div class="login-card">
      <div class="login-emblem">◆</div>
      <div class="login-brand">Noir &amp; Or</div>
      <div class="login-title">پنل مدیریت</div>
      <div class="golden-line"></div>

      <!-- Error Message -->
      <div class="error-message" id="errorMessage">
        <p>⛔ رمز عبور اشتباه است. دوباره تلاش کنید.</p>
      </div>

      <!-- Form -->
      <form class="login-form" id="loginForm" method="POST" action="login.php">
        <div class="input-group">
          <input type="text" name="username" class="login-input" placeholder="نام کاربری" value="admin" readonly required>
          <span class="input-icon">👤</span>
        </div>
        
        <div class="input-group">
          <input type="password" name="password" class="login-input" id="passwordInput" placeholder="رمز عبور" required autofocus>
          <span class="input-icon">🔒</span>
        </div>

        <button type="submit" class="btn-login">ورود به پنل</button>
      </form>

      <a href="index.html" class="back-link">← بازگشت به سایت</a>
    </div>
  </div>

  <script>
    // ============ CHECK URL PARAMETERS FOR ERROR ============
    const urlParams = new URLSearchParams(window.location.search);
    const error = urlParams.get('error');
    
    if (error === '1') {
      document.getElementById('errorMessage').classList.add('show');
      // Clear the URL
      window.history.replaceState({}, document.title, window.location.pathname);
    }

    // ============ PARTICLES MOUSE INTERACTION ============
    const particles = document.querySelectorAll('.particle');
    
    document.addEventListener('mousemove', (e) => {
      const x = e.clientX / window.innerWidth;
      const y = e.clientY / window.innerHeight;
      
      particles.forEach((p, i) => {
        const offsetX = (x - 0.5) * (25 + i * 6);
        const offsetY = (y - 0.5) * (25 + i * 6);
        p.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
      });
    });

    // ============ FORM SUBMIT EFFECT ============
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      const btn = this.querySelector('.btn-login');
      btn.textContent = 'در حال بررسی...';
      btn.style.opacity = '0.7';
    });
  </script>
</body>
</html>
